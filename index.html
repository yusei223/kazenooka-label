<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>風の丘 - Label Studio</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+JP:wght@300;500&family=Noto+Serif+JP:wght@400;700&display=swap"
    rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <link rel="stylesheet" href="./themes/base.css" />
  <link id="themeStylesheet" rel="stylesheet" href="./themes/soyokaze.css" />
</head>

<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="header-main">
          <h1>風の丘</h1>
          <p>Label Studio</p>
        </div>
        <button id="sidebarToggle" class="toggle-btn" aria-label="Toggle Sidebar">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

      <div class="control-group">
        <label for="productInput">商品名</label>
        <input id="productInput" type="text" value="手作りキャラメル" maxlength="20" placeholder="商品名を入力..." />
      </div>



      <div class="control-group">
        <label for="themeSelect">デザインテーマ</label>
        <select id="themeSelect">
          <option value="soyokaze">そよ風 (Soyokaze)</option>
          <option value="midori-no-oka">緑の丘 (Midori no Oka)</option>
          <option value="premium-sky">プレミアム・スカイ</option>
          <option value="theme-a">クラシック A</option>
          <option value="theme-b">モダン B</option>
          <option value="theme-c">ポップ C</option>
        </select>
      </div>

      <div class="divider">カラーカスタマイズ</div>

      <div class="color-custom-row">
        <div class="control-group mini">
          <label>会社</label>
          <input type="color" id="companyColor" value="#4a6741">
        </div>
        <div class="control-group mini">
          <label>商品</label>
          <input type="color" id="productColor" value="#1a1a1a">
        </div>
        <div class="control-group mini">
          <label>説明</label>
          <input type="color" id="footerColor" value="#2c2c2c">
        </div>
      </div>

      <div class="control-group">
        <label class="checkbox-label">
          <input type="checkbox" id="tiledMode"> A4用紙に並べる (複数枚)
        </label>
      </div>

      <div class="sidebar-footer">
        <button id="resetBtn" class="secondary-btn">設定をリセット</button>
        <button id="pdfBtn" class="primary-btn">PDFに保存</button>
      </div>
    </aside>

    <main class="preview-area">
      <div class="label-container" id="label">
        <div class="label-border"></div>

        <div class="header">
          <div class="company-name">風の丘</div>
          <div class="tagline">nature's gift, for your health</div>
        </div>

        <div class="cow-image-container">
          <img id="cowImg" src="花子.png" alt="Jersey Cow Hanako" class="cow-image" />
        </div>

        <div class="product-info">
          <div class="product-name" id="productName">手作りキャラメル</div>
          <div class="cow-name-tag">ジャージー牛 花子</div>
        </div>

        <div class="footer-tag">ゆっくり、ぼんやり</div>
      </div>
    </main>
  </div>

  <script src="./app.js"></script>
</body>

</html>
